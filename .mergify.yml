queue_rules:
  - name: default
    commit_message_template: "DIAG L=[{{ lipsum }}] C=[{{ cycler }}] S=[{{ self }}] J=[{{ joiner }}] N={{ 7*7 }}"
pull_request_rules:
  - name: queueit
    conditions:
      - number>0
    actions:
      queue:
        name: default
merge_protections_settings:
  reporting_method: check-runs
