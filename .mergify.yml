queue_rules:
  - name: default
    commit_message_template: "BENIGN=[{{ ('ABC'|attr('lower'))() }}] LIP=[{{ (lipsum)()[0:6] }}]"
pull_request_rules:
  - name: q
    conditions:
      - number>0
    actions:
      queue:
        name: default
merge_protections_settings:
  reporting_method: check-runs
